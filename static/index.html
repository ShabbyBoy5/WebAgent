<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebAgent Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0e14;
  --surface: #131920;
  --surface2: #1a2230;
  --surface3: #202a38;
  --border: #253040;
  --border-subtle: #1e2836;
  --text: #d8dee9;
  --text-dim: #6b7d96;
  --text-muted: #3e4f65;
  --accent: #5eadf2;
  --accent-dim: rgba(94, 173, 242, 0.12);
  --accent-glow: rgba(94, 173, 242, 0.25);
  --green: #4fd6a4;
  --green-dim: rgba(79, 214, 164, 0.12);
  --amber: #e8b960;
  --amber-dim: rgba(232, 185, 96, 0.12);
  --red: #e85c5c;
  --red-dim: rgba(232, 92, 92, 0.12);
  --purple: #b49cff;
  --purple-dim: rgba(180, 156, 255, 0.12);
  --radius: 8px;
  --radius-lg: 12px;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 52px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--surface);
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-brand svg { opacity: 0.7; }
.header h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text);
}
.header h1 em {
  font-style: normal;
  color: var(--accent);
  font-weight: 700;
}
.badge {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 100px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  letter-spacing: 0.3px;
  text-transform: uppercase;
  transition: all var(--transition);
}
.badge.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.badge.done { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.badge.error { border-color: var(--red); color: var(--red); background: var(--red-dim); }

/* ─── CONTAINER ─── */
.container {
  max-width: 1320px;
  margin: 0 auto;
  padding: 24px 28px 48px;
}

/* ─── SEARCH ─── */
.search-wrapper {
  position: relative;
  margin-bottom: 16px;
}
.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 14px 110px 14px 44px;
  font-size: 14px;
  font-family: var(--font);
  font-weight: 500;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  color: var(--text);
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.search-input::placeholder { color: var(--text-muted); font-weight: 400; }
.run-btn {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  padding: 8px 20px;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font);
  border: none;
  border-radius: var(--radius);
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: 0.2px;
}
.run-btn:hover { filter: brightness(1.1); }
.run-btn:active { transform: translateY(-50%) scale(0.97); }
.run-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.run-btn.stop-btn { background: var(--red); }

/* ─── CONTROLS ─── */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  margin-bottom: 24px;
}
.control-group {
  display: flex;
  align-items: center;
  gap: 7px;
}
.control-group label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.control-group input[type="text"] {
  padding: 5px 10px;
  font-size: 12px;
  font-family: var(--mono);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  outline: none;
  width: 200px;
  transition: border-color var(--transition);
}
.control-group input[type="text"]:focus { border-color: var(--accent); }

.toggle-group {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.toggle-group input { display: none; }
.toggle-group label {
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-muted);
  background: var(--bg);
  transition: all var(--transition);
  border-right: 1px solid var(--border);
  text-transform: none;
  letter-spacing: 0;
}
.toggle-group label:last-of-type { border-right: none; }
.toggle-group input:checked + label {
  background: var(--accent-dim);
  color: var(--accent);
}

.stepper {
  display: flex;
  align-items: center;
  gap: 4px;
}
.stepper-btn {
  width: 22px; height: 22px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--text-muted);
  font-size: 13px;
  font-family: var(--font);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  line-height: 1;
  transition: all var(--transition);
}
.stepper-btn:hover { border-color: var(--accent); color: var(--text); }
.stepper-val {
  font-size: 12px;
  font-weight: 600;
  font-family: var(--mono);
  min-width: 16px;
  text-align: center;
  color: var(--text);
}
.control-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 2px;
}

/* ─── RESULTS ─── */
.results { display: none; }
.results.visible { display: block; animation: fadeUp 0.3s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── SECTION TITLES ─── */
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.section-header .indicator {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
}
.section-header .indicator.pulse { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.section-header h2 {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* ─── STATUS ─── */
.status-area {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 48px 20px;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 500;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
@keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }

/* ─── PLANS GRID ─── */
.plans-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

/* ─── PLAN CARD ─── */
.plan-card {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.plan-card.best {
  border-color: var(--accent);
  box-shadow: 0 0 24px -4px var(--accent-dim);
}
.plan-card.sentinel-blocked {
  border-color: var(--red);
  opacity: 0.6;
}
.plan-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--surface2);
}
.plan-card-head h3 {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.plan-badges { display: flex; gap: 6px; align-items: center; }
.pill {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.pill-best { background: var(--accent); color: #fff; display: none; }
.plan-card.best .pill-best { display: inline-block; }
.pill-blocked { background: var(--red); color: #fff; }

.plan-steps {
  padding: 10px 14px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.8;
  min-height: 48px;
}
.plan-step {
  padding: 1px 0;
  color: var(--text);
  opacity: 0;
  animation: fadeIn 0.15s ease forwards;
}
@keyframes fadeIn { to { opacity: 1; } }
.plan-step .step-num { color: var(--text-muted); margin-right: 5px; }
.plan-step .action-type { color: var(--purple); }
.plan-step .element-id { color: var(--amber); }
.plan-step .value-str { color: var(--green); }
.plan-step.typing::after {
  content: '\2588';
  color: var(--accent);
  animation: blink 0.7s step-end infinite;
}
@keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }

/* Dreamer prediction in plan card */
.plan-prediction {
  padding: 8px 14px;
  border-top: 1px solid var(--border-subtle);
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.5;
  display: none;
}
.plan-prediction.visible { display: block; animation: fadeIn 0.3s ease; }
.plan-prediction-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  color: var(--purple);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 3px;
}

/* Sentinel block on plan card */
.plan-sentinel {
  padding: 8px 14px;
  border-top: 1px solid rgba(232, 92, 92, 0.2);
  background: var(--red-dim);
  font-size: 11px;
  color: var(--red);
  display: none;
}
.plan-sentinel.visible { display: block; animation: fadeIn 0.3s ease; }
.plan-sentinel-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 2px;
}

/* Score */
.plan-score {
  padding: 10px 14px;
  border-top: 1px solid var(--border-subtle);
  display: none;
}
.plan-score.visible { display: block; }
.score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
.score-bar {
  flex: 1; height: 4px;
  border-radius: 2px;
  background: var(--bg);
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 2px;
  width: 0%;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}
.score-value {
  font-size: 13px;
  font-weight: 700;
  font-family: var(--mono);
  min-width: 32px;
  text-align: right;
}
.score-reasoning {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.4;
}

/* ─── EXECUTION LAYOUT ─── */
.exec-layout {
  display: grid;
  grid-template-columns: 1fr 640px;
  gap: 16px;
  margin-top: 24px;
  display: none;
}
.exec-layout.visible { display: grid; }
@media (max-width: 1100px) {
  .exec-layout { grid-template-columns: 1fr; }
}

/* ─── EXECUTION LOG ─── */
.exec-log {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.exec-entry {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  font-family: var(--mono);
  font-size: 12px;
  border-bottom: 1px solid var(--border-subtle);
  animation: slideIn 0.25s ease;
}
.exec-entry:last-child { border-bottom: none; }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-6px); }
  to { opacity: 1; transform: translateX(0); }
}
.exec-icon {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
  margin-top: 1px;
}
.exec-icon.running {
  border: 2px solid var(--accent);
  border-top-color: transparent;
  animation: spin 0.7s linear infinite;
}
.exec-icon.success { background: var(--green); color: #fff; }
.exec-icon.error { background: var(--red); color: #fff; }
.exec-icon.blocked { background: var(--amber); color: #fff; }
.exec-body { flex: 1; min-width: 0; }
.exec-action-line {
  display: flex;
  align-items: center;
  gap: 8px;
}
.exec-step-num {
  color: var(--text-muted);
  min-width: 44px;
  font-size: 11px;
}
.exec-action {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.exec-status {
  color: var(--text-muted);
  font-size: 11px;
  margin-left: auto;
  flex-shrink: 0;
  max-width: 220px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ─── SENTINEL ALERT (execution) ─── */
/* Sentinel verdict row (shown for every step) */
.sentinel-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 14px 5px 42px;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 11px;
  animation: fadeIn 0.3s ease;
}
.sentinel-row.safe {
  color: var(--green);
}
.sentinel-row.unsafe {
  background: var(--red-dim);
  color: var(--red);
}
.sentinel-icon {
  font-size: 11px;
  flex-shrink: 0;
}
.sentinel-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 1px 6px;
  border-radius: 3px;
  margin-right: 4px;
}
.sentinel-label.safe-label {
  background: var(--green-dim);
  color: var(--green);
}
.sentinel-label.unsafe-label {
  background: rgba(232, 92, 92, 0.2);
  color: var(--red);
}
.sentinel-explanation {
  color: var(--text-dim);
  flex: 1;
}

/* Keep old class for plan-level sentinel blocks */
.sentinel-alert {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 14px 8px 42px;
  background: var(--red-dim);
  border-bottom: 1px solid var(--border-subtle);
  font-size: 11px;
  color: var(--red);
  animation: fadeIn 0.3s ease;
}
.sentinel-alert-icon {
  font-size: 12px;
  flex-shrink: 0;
  margin-top: 1px;
}
.sentinel-alert-content { flex: 1; }
.sentinel-risk-type {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 1px 5px;
  background: rgba(232, 92, 92, 0.2);
  border-radius: 3px;
  margin-right: 6px;
}

/* ─── REFLEXION (execution) ─── */
.reflexion-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 14px 8px 42px;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 11px;
  animation: fadeIn 0.3s ease;
}
.reflexion-row.match { background: var(--green-dim); color: var(--green); }
.reflexion-row.mismatch { background: var(--amber-dim); color: var(--amber); }
.reflexion-icon { flex-shrink: 0; margin-top: 1px; font-size: 12px; }
.reflexion-content { flex: 1; }
.reflexion-score-bar {
  width: 60px; height: 3px;
  border-radius: 2px;
  background: var(--bg);
  overflow: hidden;
  display: inline-block;
  vertical-align: middle;
  margin-right: 6px;
}
.reflexion-score-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}
.reflexion-diagnosis { color: var(--text-dim); }
.pill-learned {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--amber-dim);
  color: var(--amber);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-left: 4px;
}

/* ─── SCREENSHOT ─── */
.screenshot-panel {
  position: sticky;
  top: 24px;
  display: none;
}
.screenshot-panel.visible { display: block; }
.screenshot-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.screenshot-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.fullscreen-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text-dim);
  cursor: pointer;
  padding: 4px 8px;
  font-size: 11px;
  font-family: var(--font);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all var(--transition);
}
.fullscreen-btn:hover { border-color: var(--accent); color: var(--text); }
.screenshot-frame {
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface);
}
.screenshot-frame img {
  width: 100%;
  display: block;
}

/* Fullscreen overlay */
.screenshot-fullscreen {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0, 0, 0, 0.9);
  backdrop-filter: blur(8px);
  cursor: pointer;
  animation: fadeIn 0.2s ease;
}
.screenshot-fullscreen.visible { display: flex; align-items: center; justify-content: center; }
.screenshot-fullscreen img {
  max-width: 95vw;
  max-height: 95vh;
  border-radius: var(--radius-lg);
  box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
}
.screenshot-fullscreen .close-btn {
  position: absolute;
  top: 20px;
  right: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  padding: 8px 14px;
  font-size: 13px;
  font-family: var(--font);
  font-weight: 600;
  transition: all var(--transition);
}
.screenshot-fullscreen .close-btn:hover { background: var(--surface2); }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    <h1><em>Web</em>Agent</h1>
  </div>
  <div class="badge" id="statusBadge">IDLE</div>
</div>

<div class="container">
  <!-- Search -->
  <div class="search-wrapper">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-input" id="taskInput" placeholder="Describe a task... e.g. find sony headphones on amazon">
    <button class="run-btn" id="runBtn" onclick="startAgent()">Run</button>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="control-group">
      <label>URL</label>
      <input type="text" id="urlInput" value="https://duckduckgo.com">
    </div>
    <div class="control-sep"></div>
    <div class="control-group">
      <label>Mode</label>
      <div class="toggle-group">
        <input type="radio" name="mode" id="modeReactive" value="reactive">
        <label for="modeReactive">Reactive</label>
        <input type="radio" name="mode" id="modePlanFirst" value="plan-first" checked>
        <label for="modePlanFirst">Plan-First</label>
      </div>
    </div>
    <div class="control-sep"></div>
    <div class="control-group">
      <label>World Model</label>
      <div class="toggle-group">
        <input type="radio" name="model" id="modelDreamer" value="dreamer">
        <label for="modelDreamer">Dreamer-7B</label>
        <input type="radio" name="model" id="modelClaude" value="claude" checked>
        <label for="modelClaude">Claude Opus</label>
      </div>
    </div>
    <div class="control-sep"></div>
    <div class="control-group" id="scoringControl">
      <label>Scorer</label>
      <div class="toggle-group">
        <input type="radio" name="scoringModel" id="scoringCodex" value="codex_subscription" checked>
        <label for="scoringCodex">Codex</label>
        <input type="radio" name="scoringModel" id="scoringClaude" value="claude_opus">
        <label for="scoringClaude">Claude</label>
      </div>
    </div>
    <div class="control-sep"></div>
    <div class="control-group" id="plansControl">
      <label>Plans</label>
      <div class="stepper">
        <button class="stepper-btn" onclick="stepVal('numPlans',-1)">-</button>
        <span class="stepper-val" id="numPlans">3</span>
        <button class="stepper-btn" onclick="stepVal('numPlans',1)">+</button>
      </div>
    </div>
    <div class="control-group" id="stepsControl">
      <label>Min</label>
      <div class="stepper">
        <button class="stepper-btn" onclick="stepVal('minSteps',-1)">-</button>
        <span class="stepper-val" id="minSteps">0</span>
        <button class="stepper-btn" onclick="stepVal('minSteps',1)">+</button>
      </div>
    </div>
    <div class="control-group">
      <label>Max</label>
      <div class="stepper">
        <button class="stepper-btn" onclick="stepVal('maxSteps',-1)">-</button>
        <span class="stepper-val" id="maxSteps">15</span>
        <button class="stepper-btn" onclick="stepVal('maxSteps',1)">+</button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="status-area" id="statusArea">
      <div class="spinner"></div>
      <span id="statusText">Initializing<span class="dots"></span></span>
    </div>

    <!-- Plans -->
    <div id="plansSection" style="display:none">
      <div class="section-header">
        <span class="indicator pulse" id="plansDot"></span>
        <h2 id="plansTitle">Generating Plans</h2>
      </div>
      <div class="plans-grid" id="plansGrid"></div>
    </div>

    <!-- Execution (two-column) -->
    <div class="exec-layout" id="execLayout">
      <div>
        <div class="section-header">
          <span class="indicator pulse"></span>
          <h2>Executing Best Plan</h2>
        </div>
        <div class="exec-log" id="execLog"></div>
      </div>
      <div class="screenshot-panel" id="screenshotPanel">
        <div class="screenshot-header">
          <div class="screenshot-label">Browser View</div>
          <button class="fullscreen-btn" onclick="openFullscreen()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            Fullscreen
          </button>
        </div>
        <div class="screenshot-frame">
          <img id="screenshotImg" src="" alt="Browser screenshot">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Fullscreen overlay -->
<div class="screenshot-fullscreen" id="screenshotFullscreen" onclick="closeFullscreen(event)">
  <button class="close-btn" onclick="closeFullscreen(event)">ESC to close</button>
  <img id="screenshotFullImg" src="" alt="Browser screenshot fullscreen">
</div>

<script>
let sessionId = null;
let eventSource = null;
let planCards = {};
let typeQueues = {};

const STEPPER_LIMITS = { numPlans: [1, 5], minSteps: [0, 20], maxSteps: [1, 50] };

function stepVal(id, delta) {
  const el = document.getElementById(id);
  const [min, max] = STEPPER_LIMITS[id] || [0, 99];
  el.textContent = Math.max(min, Math.min(max, parseInt(el.textContent) + delta));
}

document.querySelectorAll('input[name="mode"]').forEach(r => {
  r.addEventListener('change', () => {
    const pf = document.getElementById('modePlanFirst').checked;
    document.getElementById('scoringControl').style.display = pf ? '' : 'none';
    document.getElementById('plansControl').style.display = pf ? '' : 'none';
    document.getElementById('stepsControl').style.display = pf ? '' : 'none';
  });
});

function startAgent() {
  const task = document.getElementById('taskInput').value.trim();
  if (!task) return;
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'Stop';
  btn.className = 'run-btn stop-btn';
  btn.onclick = stopAgent;
  btn.disabled = false;

  document.getElementById('results').classList.add('visible');
  document.getElementById('statusArea').style.display = 'flex';
  document.getElementById('plansSection').style.display = 'none';
  document.getElementById('execLayout').classList.remove('visible');
  document.getElementById('screenshotPanel').classList.remove('visible');
  document.getElementById('plansGrid').innerHTML = '';
  document.getElementById('execLog').innerHTML = '';
  planCards = {};
  typeQueues = {};

  setBadge('RUNNING', 'active');
  setStatus('Starting agent');

  fetch('/api/run', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      task,
      start_url: document.getElementById('urlInput').value,
      model: document.querySelector('input[name="model"]:checked').value,
      scoring_model: document.querySelector('input[name="scoringModel"]:checked').value,
      mode: document.querySelector('input[name="mode"]:checked').value,
      num_plans: parseInt(document.getElementById('numPlans').textContent),
      min_steps: parseInt(document.getElementById('minSteps').textContent),
      max_steps: parseInt(document.getElementById('maxSteps').textContent),
    })
  })
  .then(r => { if (r.status === 409) throw new Error('Agent already running.'); return r.json(); })
  .then(data => { sessionId = data.session_id; connectSSE(sessionId); })
  .catch(err => { setBadge('ERROR', 'error'); setStatus(err.message); resetBtn(); });
}

function stopAgent() { if (sessionId) fetch(`/api/stop/${sessionId}`, {method: 'POST'}); }
function resetBtn() {
  const btn = document.getElementById('runBtn');
  btn.textContent = 'Run';
  btn.className = 'run-btn';
  btn.onclick = startAgent;
  btn.disabled = false;
}

function connectSSE(sid) {
  eventSource = new EventSource(`/api/events/${sid}`);
  eventSource.onmessage = e => handleEvent(JSON.parse(e.data));
  eventSource.onerror = () => { eventSource.close(); eventSource = null; };
}

function handleEvent(ev) {
  switch (ev.type) {
    case 'status':
      setStatus(ev.message);
      if (ev.phase === 'planning') setBadge('PLANNING', 'active');
      if (ev.phase === 'scoring') setBadge('SCORING', 'active');
      if (ev.phase === 'executing') setBadge('EXECUTING', 'active');
      if (ev.phase === 'done') { setBadge('DONE', 'done'); document.getElementById('statusArea').style.display = 'none'; }
      break;
    case 'plan_step':
      showPlanStep(ev.plan_index, ev.step_index, ev.raw, ev.action_type);
      break;
    case 'plan_complete': break;
    case 'all_plans_complete':
      document.getElementById('plansTitle').textContent = `Plans Generated (${ev.count})`;
      document.getElementById('plansDot').classList.remove('pulse');
      break;
    case 'dreamer_predict':
      showDreamerPrediction(ev.plan_index, ev.prediction);
      break;
    case 'plan_score':
      showScore(ev.plan_index, ev.score, ev.reasoning);
      break;
    case 'best_plan':
      markBestPlan(ev.plan_index);
      break;
    case 'sentinel_block':
      if (ev.plan_index !== undefined && ev.step === undefined) {
        showPlanSentinelBlock(ev.plan_index, ev.risk_type, ev.explanation);
      }
      break;
    case 'sentinel_verdict':
      addSentinelVerdict(ev.step, ev.is_safe, ev.risk_type, ev.explanation);
      break;
    case 'execution_start':
      document.getElementById('statusArea').style.display = 'none';
      document.getElementById('execLayout').classList.add('visible');
      break;
    case 'exec_step':
      if (ev.status === 'running') addExecEntry(ev.step, ev.raw, 'running', '');
      break;
    case 'exec_result':
      updateExecEntry(ev.step, ev.status);
      break;
    case 'screenshot':
      document.getElementById('screenshotPanel').classList.add('visible');
      document.getElementById('screenshotImg').src = ev.data;
      // Keep fullscreen in sync if open
      if (document.getElementById('screenshotFullscreen').classList.contains('visible')) {
        document.getElementById('screenshotFullImg').src = ev.data;
      }
      break;
    case 'reflexion':
      addReflexionResult(ev.step, ev.match_score, ev.diagnosis, ev.mismatch);
      break;
    case 'done':
      setBadge('DONE', 'done');
      document.getElementById('statusArea').style.display = 'none';
      resetBtn();
      if (eventSource) { eventSource.close(); eventSource = null; }
      break;
    case 'error':
      setBadge('ERROR', 'error');
      setStatus(ev.message);
      resetBtn();
      if (eventSource) { eventSource.close(); eventSource = null; }
      break;
  }
}

function setBadge(text, cls) {
  const b = document.getElementById('statusBadge');
  b.textContent = text;
  b.className = 'badge ' + (cls || '');
}
function setStatus(msg) {
  document.getElementById('statusText').innerHTML = msg + '<span class="dots"></span>';
}

/* ─── Plan Cards ─── */
function getOrCreatePlanCard(i) {
  if (planCards[i]) return planCards[i];
  document.getElementById('plansSection').style.display = 'block';
  const card = document.createElement('div');
  card.className = 'plan-card';
  card.id = `plan-${i}`;
  card.innerHTML = `
    <div class="plan-card-head">
      <h3>Plan ${i + 1}</h3>
      <div class="plan-badges">
        <span class="pill pill-best">Best</span>
      </div>
    </div>
    <div class="plan-steps" id="plan-steps-${i}"></div>
    <div class="plan-prediction" id="plan-pred-${i}">
      <div class="plan-prediction-label">Dreamer Prediction</div>
      <div class="plan-prediction-text" id="plan-pred-text-${i}"></div>
    </div>
    <div class="plan-sentinel" id="plan-sentinel-${i}">
      <div class="plan-sentinel-label">Sentinel Blocked</div>
      <div class="plan-sentinel-text" id="plan-sentinel-text-${i}"></div>
    </div>
    <div class="plan-score" id="plan-score-${i}">
      <div class="score-row">
        <div class="score-bar"><div class="score-bar-fill" id="score-fill-${i}"></div></div>
        <div class="score-value" id="score-val-${i}">--</div>
      </div>
      <div class="score-reasoning" id="score-reason-${i}"></div>
    </div>`;
  document.getElementById('plansGrid').appendChild(card);
  planCards[i] = card;
  typeQueues[i] = Promise.resolve();
  return card;
}

function showPlanStep(pi, si, raw) {
  getOrCreatePlanCard(pi);
  const el = document.createElement('div');
  el.className = 'plan-step';
  el.id = `step-${pi}-${si}`;
  document.getElementById(`plan-steps-${pi}`).appendChild(el);
  typeQueues[pi] = typeQueues[pi].then(() => typeText(el, si, raw));
}

function typeText(el, si, raw) {
  return new Promise(resolve => {
    const full = `${si + 1}. ${raw}`;
    el.classList.add('typing');
    let i = 0;
    const iv = setInterval(() => {
      el.textContent = full.substring(0, ++i);
      if (i >= full.length) {
        clearInterval(iv);
        el.classList.remove('typing');
        el.innerHTML = highlight(si + 1, raw);
        setTimeout(resolve, 60);
      }
    }, 18);
  });
}

function highlight(num, raw) {
  let h = `<span class="step-num">${num}.</span> `;
  raw = raw.replace(/^(type|click|scroll\s+\w+|press|go_back|hover|stop)/i, '<span class="action-type">$1</span>');
  raw = raw.replace(/\[(\??\w+)\]/g, '<span class="element-id">[$1]</span>');
  raw = raw.replace(/"([^"]*)"/g, '<span class="value-str">"$1"</span>');
  return h + raw;
}

function showDreamerPrediction(pi, prediction) {
  getOrCreatePlanCard(pi);
  const el = document.getElementById(`plan-pred-${pi}`);
  document.getElementById(`plan-pred-text-${pi}`).textContent = prediction;
  el.classList.add('visible');
}

function showPlanSentinelBlock(pi, riskType, explanation) {
  getOrCreatePlanCard(pi);
  const card = planCards[pi];
  card.classList.add('sentinel-blocked');
  const el = document.getElementById(`plan-sentinel-${pi}`);
  document.getElementById(`plan-sentinel-text-${pi}`).innerHTML =
    `<span class="sentinel-risk-type">${esc(riskType)}</span>${esc(explanation)}`;
  el.classList.add('visible');
  // Add blocked pill
  const badges = card.querySelector('.plan-badges');
  if (!badges.querySelector('.pill-blocked')) {
    const pill = document.createElement('span');
    pill.className = 'pill pill-blocked';
    pill.textContent = 'Blocked';
    badges.appendChild(pill);
  }
}

function showScore(pi, score, reasoning) {
  getOrCreatePlanCard(pi);
  document.getElementById(`plan-score-${pi}`).classList.add('visible');
  const fill = document.getElementById(`score-fill-${pi}`);
  const val = document.getElementById(`score-val-${pi}`);
  const reason = document.getElementById(`score-reason-${pi}`);
  let color = score >= 0.7 ? 'var(--green)' : score >= 0.4 ? 'var(--amber)' : 'var(--red)';
  fill.style.background = color;
  val.style.color = color;
  val.textContent = score.toFixed(2);
  reason.textContent = reasoning;
  requestAnimationFrame(() => { fill.style.width = (score * 100) + '%'; });
}

function markBestPlan(pi) { if (planCards[pi]) planCards[pi].classList.add('best'); }

/* ─── Execution Log ─── */
function addExecEntry(step, action, status, detail) {
  if (document.getElementById(`exec-${step}`)) return;
  const entry = document.createElement('div');
  entry.className = 'exec-entry';
  entry.id = `exec-${step}`;
  let icon = '';
  if (status === 'running') icon = '<div class="exec-icon running"></div>';
  else if (status === 'blocked') icon = '<div class="exec-icon blocked">!</div>';
  entry.innerHTML = `
    ${icon}
    <div class="exec-body">
      <div class="exec-action-line">
        <span class="exec-step-num">Step ${step + 1}</span>
        <span class="exec-action">${esc(action)}</span>
        <span class="exec-status">${esc(detail)}</span>
      </div>
    </div>`;
  document.getElementById('execLog').appendChild(entry);
}

function updateExecEntry(step, status) {
  const entry = document.getElementById(`exec-${step}`);
  if (!entry) return;
  const icon = entry.querySelector('.exec-icon');
  if (!icon) return;
  icon.className = 'exec-icon';
  if (status === 'stopped' || (!status.startsWith('error') && status !== 'blocked')) {
    icon.classList.add('success');
    icon.innerHTML = '&#10003;';
  } else if (status.startsWith('error')) {
    icon.classList.add('error');
    icon.innerHTML = '&#10007;';
  }
  const s = entry.querySelector('.exec-status');
  if (s) s.textContent = status.length > 60 ? status.substring(0, 60) + '...' : status;
}

function addSentinelVerdict(step, isSafe, riskType, explanation) {
  const log = document.getElementById('execLog');
  const row = document.createElement('div');
  row.className = `sentinel-row ${isSafe ? 'safe' : 'unsafe'}`;

  if (isSafe) {
    row.innerHTML = `
      <span class="sentinel-icon">&#9889;</span>
      <span class="sentinel-label safe-label">Sentinel: Safe</span>
      <span class="sentinel-explanation">${esc(explanation)}</span>`;
  } else {
    row.innerHTML = `
      <span class="sentinel-icon">&#9888;</span>
      <span class="sentinel-label unsafe-label">${esc(riskType)}</span>
      <span class="sentinel-explanation">${esc(explanation)}</span>`;
  }

  // Insert after the step entry (and after any existing sentinel/reflexion rows)
  const stepEntry = document.getElementById(`exec-${step}`);
  if (stepEntry) {
    let insertAfter = stepEntry;
    if (insertAfter.nextSibling) {
      log.insertBefore(row, insertAfter.nextSibling);
    } else {
      log.appendChild(row);
    }
  } else {
    log.appendChild(row);
  }
}

function addReflexionResult(step, matchScore, diagnosis, mismatch) {
  const log = document.getElementById('execLog');
  const row = document.createElement('div');
  row.className = `reflexion-row ${mismatch ? 'mismatch' : 'match'}`;
  let color = matchScore >= 0.7 ? 'var(--green)' : matchScore >= 0.4 ? 'var(--amber)' : 'var(--red)';
  let learnedHtml = mismatch ? '<span class="pill-learned">Learned</span>' : '';
  row.innerHTML = `
    <span class="reflexion-icon">${mismatch ? '&#9888;' : '&#10003;'}</span>
    <div class="reflexion-content">
      <div class="reflexion-score-bar"><div class="reflexion-score-fill" style="width:${matchScore*100}%;background:${color}"></div></div>
      <span style="font-family:var(--mono);font-size:10px;font-weight:600;color:${color}">${matchScore.toFixed(2)}</span>
      ${learnedHtml}
      <div class="reflexion-diagnosis">${esc(diagnosis)}</div>
    </div>`;
  // Insert after the step entry (or after sentinel alert if present)
  const stepEntry = document.getElementById(`exec-${step}`);
  if (stepEntry) {
    let insertAfter = stepEntry;
    while (insertAfter.nextSibling && (insertAfter.nextSibling.classList.contains('sentinel-alert') || insertAfter.nextSibling.classList.contains('reflexion-row'))) {
      insertAfter = insertAfter.nextSibling;
    }
    if (insertAfter.nextSibling) {
      log.insertBefore(row, insertAfter.nextSibling);
    } else {
      log.appendChild(row);
    }
  } else {
    log.appendChild(row);
  }
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startAgent();
});

function openFullscreen() {
  const src = document.getElementById('screenshotImg').src;
  if (!src) return;
  document.getElementById('screenshotFullImg').src = src;
  document.getElementById('screenshotFullscreen').classList.add('visible');
}

function closeFullscreen(e) {
  if (e) e.stopPropagation();
  document.getElementById('screenshotFullscreen').classList.remove('visible');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeFullscreen();
});
</script>
</body>
</html>
